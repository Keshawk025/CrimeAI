# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration file.
# The sqlalchemy.url value is overridden at runtime in env.py via
# get_settings().sync_database_url so we leave it as a placeholder here.

[alembic]
script_location = alembic
prepend_sys_path = .

# Token placeholder — real URL injected in env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

version_path_separator = os   # Use os.pathsep.

[post_write_hooks]
# no hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
